<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ぬるぬる - Nostr クライアント</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            padding: 40px 20px;
        }
        .app-icon {
            width: 160px;
            height: 160px;
            border-radius: 36px;
            object-fit: cover;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .app-name {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }
        .privacy-link {
            font-size: 0.875rem;
            color: #555;
            text-decoration: none;
            border-bottom: 1px solid #333;
            padding-bottom: 2px;
            transition: color 0.2s;
        }
        .privacy-link:hover { color: #aaa; }
    </style>
</head>
<body>
    <img
        src="https://blossom.primal.net/dfd7b7921c2916b297a0768f9f629ca31976806c2fcddba4bcefc23b3f135e2c.jpg"
        alt="ぬるぬる"
        class="app-icon"
    >
    <div class="app-name">ぬるぬる</div>
    <a href="privacy.html" class="privacy-link">プライバシーポリシー</a>
</body>
</html>
