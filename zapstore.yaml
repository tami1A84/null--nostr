description: |
  「ぬるぬる」は、シンプルで使いやすいNostrクライアントです。

  📱 タイムライン
  フォロー中の投稿を表示。画像・動画・カスタム絵文字・長文記事に対応。
  ホームタブで自分の投稿といいね一覧を切り替え表示。

  ✍️ 投稿
  最大3枚の画像を同時アップロード。投稿先リレーをその都度選択可能。

  💬 トーク
  E2E暗号化のDMとグループチャット（NIP-EE / MLS）。旧来のDMの読み取りにも対応。

  ⚡ Zap
  LightningインボイスをアプリからそのままZap送信。

  🔍 検索
  全文検索で #タグ、from:npub、filter:image などのコマンドに対応。

  🧩 ミニアプリ
  カスタム絵文字、プロフィールバッジ、リレー設定、ミュートリスト、Zap設定、
  調整くん、音声入力設定、バックアップ、削除リクエスト、キャッシュ設定。

  🔑 ログイン
  nsec・外部署名アプリ（Amber）に対応。

